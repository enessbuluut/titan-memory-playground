name: CI

on:
  push:
  pull_request:

jobs:
  minimum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools + python
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make python3 python3-pip curl git

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          syft version

      # Gitleaks kurulumla değil, action ile:
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup check
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Build
        run: make build

      # make secret-scan step'ini CI'dan kaldırdık çünkü action zaten tarıyor.

      - name: SBOM
        run: make sbom