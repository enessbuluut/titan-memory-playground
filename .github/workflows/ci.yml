name: CI

on:
  push:
  pull_request:

jobs:
  minimum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools + python
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make python3 python3-venv python3-pip git

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | bash -s -- -b /usr/local/bin
          gitleaks version

      - name: Setup check
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Build
        run: make build

      - name: Secret scan
        run: make secret-scan

      - name: SBOM
        run: make sbom